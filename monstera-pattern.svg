<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.04">
  <!-- Delicate, fine-lined Monstera (Costela de Adão) pattern -->
  <!-- Stem -->
  <path d="M 100 190 Q 105 140 100 20" fill="none" stroke="#657F38" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Left side of leaf -->
  <path d="M 100 20 C 60 20 30 60 30 110 C 30 150 60 180 100 190" fill="none" stroke="#657F38" stroke-width="0.8"/>
  
  <!-- Right side of leaf -->
  <path d="M 100 20 C 140 20 170 60 170 110 C 170 150 140 180 100 190" fill="none" stroke="#657F38" stroke-width="0.8"/>
  
  <!-- Cutouts (fenestrations) left -->
  <path d="M 30 70 C 60 70 80 50 100 40" fill="none" stroke="#FAF7F0" stroke-width="1.5"/>
  <path d="M 32 110 C 65 110 85 90 100 70" fill="none" stroke="#FAF7F0" stroke-width="2"/>
  <path d="M 40 145 C 70 145 90 125 100 105" fill="none" stroke="#FAF7F0" stroke-width="1.5"/>
  
  <!-- Cutouts (fenestrations) right -->
  <path d="M 170 70 C 140 70 120 50 100 40" fill="none" stroke="#FAF7F0" stroke-width="1.5"/>
  <path d="M 168 110 C 135 110 115 90 100 70" fill="none" stroke="#FAF7F0" stroke-width="2"/>
  <path d="M 160 145 C 130 145 110 125 100 105" fill="none" stroke="#FAF7F0" stroke-width="1.5"/>
  
  <!-- Inner delicate holes typical of monstera -->
  <ellipse cx="60" cy="85" rx="3" ry="5" fill="none" stroke="#657F38" stroke-width="0.5" transform="rotate(-30 60 85)"/>
  <ellipse cx="140" cy="85" rx="3" ry="5" fill="none" stroke="#657F38" stroke-width="0.5" transform="rotate(30 140 85)"/>
  <ellipse cx="75" cy="130" rx="2" ry="4" fill="none" stroke="#657F38" stroke-width="0.5" transform="rotate(-45 75 130)"/>
  <ellipse cx="125" cy="130" rx="2" ry="4" fill="none" stroke="#657F38" stroke-width="0.5" transform="rotate(45 125 130)"/>
  
  <!-- Inner veining, very faint -->
  <path d="M 100 40 Q 80 45 60 35" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 70 Q 75 80 50 75" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 105 Q 80 120 60 120" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 140 Q 85 155 70 160" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  
  <path d="M 100 40 Q 120 45 140 35" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 70 Q 125 80 150 75" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 105 Q 120 120 140 120" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
  <path d="M 100 140 Q 115 155 130 160" fill="none" stroke="#657F38" stroke-width="0.3" opacity="0.5"/>
</svg>
